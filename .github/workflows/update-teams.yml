name: Update team data

# Runs every day at 03:00 UTC. Also manually triggerable from the
# Actions tab (workflow_dispatch).
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run updater
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/update-teams.js

      - name: Commit updated teams.js (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add teams.js
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): auto-update team stats [skip ci]"
            git push
          fi
