name: Update fixtures

# Runs every 6 hours to keep today's & tomorrow's fixtures fresh.
# Also manually triggerable from the Actions tab (workflow_dispatch).
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run fixtures updater
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/update-fixtures.js

      - name: Commit updated fixtures.js (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fixtures.js
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): auto-update fixtures [skip ci]"
            git push
          fi
