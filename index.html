<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEON ORACLE // Football Predictor</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="scanlines"></div>
<div class="grid-bg"></div>

<header class="hero">
  <div class="logo">
    <span class="glitch" data-text="NEON">NEON</span>
    <span class="glitch alt" data-text="ORACLE">ORACLE</span>
  </div>
  <p class="tagline">// FOOTBALL MATCH PREDICTION ENGINE — v1.0 //</p>
</header>

<main>
  <section class="panel fixtures-panel" id="fixtures-panel">
    <div class="fixtures-header">
      <h2 class="panel-title">&gt;&gt; MAI MECCSEK</h2>
      <div class="fixtures-controls">
        <select id="fixture-league-filter">
          <option value="ALL">ÖSSZES LIGA</option>
          <option value="EPL">Premier League</option>
          <option value="LALIGA">La Liga</option>
          <option value="SERIEA">Serie A</option>
          <option value="BUNDES">Bundesliga</option>
          <option value="LIGUE1">Ligue 1</option>
        </select>
        <select id="fixture-day-filter">
          <option value="today">Ma</option>
          <option value="tomorrow">Holnap</option>
          <option value="all">Ma + Holnap</option>
        </select>
        <button type="button" id="fixture-manual-btn" class="btn-small">+ KÉZI</button>
      </div>
    </div>
    <div id="fixtures-updated" class="fixtures-updated"></div>

    <form id="manual-fixture-form" class="manual-fixture-form hidden" autocomplete="off">
      <select id="m-league" required>
        <option value="">-- Liga --</option>
        <option value="EPL">Premier League</option>
        <option value="LALIGA">La Liga</option>
        <option value="SERIEA">Serie A</option>
        <option value="BUNDES">Bundesliga</option>
        <option value="LIGUE1">Ligue 1</option>
        <option value="NB1">NB I.</option>
        <option value="UCL">UCL</option>
        <option value="OTHER">Egyéb</option>
      </select>
      <input type="datetime-local" id="m-date" required />
      <input type="text" id="m-home" list="teams" placeholder="Hazai csapat" required />
      <input type="text" id="m-away" list="teams" placeholder="Vendég csapat" required />
      <button type="submit" class="btn-small">+ HOZZÁAD</button>
    </form>

    <div id="fixtures-suggestions" class="fixtures-suggestions"></div>
    <div id="fixtures-list" class="fixtures-list"></div>
  </section>

  <aside id="betslip" class="betslip">
    <div class="betslip-header">
      <h2 class="panel-title">&gt;&gt; SZELVÉNY <span id="slip-count">(0)</span></h2>
      <button type="button" id="slip-clear" class="btn-small">ÜRÍTÉS</button>
    </div>
    <div id="slip-items"></div>
    <div id="slip-summary" class="slip-summary">
      <div class="slip-stat">
        <span class="slip-stat-label">Együttes valószínűség</span>
        <span class="mono slip-stat-val" id="slip-prob">—</span>
      </div>
      <div class="slip-stat">
        <span class="slip-stat-label">Implicit odds</span>
        <span class="mono slip-stat-val" id="slip-odds">—</span>
      </div>
    </div>
  </aside>

  <section class="panel">
    <h2 class="panel-title">&gt;&gt; INPUT_MATCH_DATA</h2>

    <form id="predict-form" class="form-grid" autocomplete="off">
      <label>
        <span>BAJNOKSÁG</span>
        <select id="league" required>
          <option value="">-- válassz --</option>
          <option value="EPL">Premier League (ENG)</option>
          <option value="LALIGA">La Liga (ESP)</option>
          <option value="SERIEA">Serie A (ITA)</option>
          <option value="BUNDES">Bundesliga (GER)</option>
          <option value="LIGUE1">Ligue 1 (FRA)</option>
          <option value="NB1">NB I. (HUN)</option>
          <option value="UCL">UEFA Champions League</option>
          <option value="OTHER">Egyéb</option>
        </select>
      </label>

      <label>
        <span>DÁTUM</span>
        <input type="date" id="match-date" required />
      </label>

      <label>
        <span>HAZAI CSAPAT</span>
        <input type="text" id="home-team" list="teams" placeholder="pl. Manchester City" required />
      </label>

      <label>
        <span>VENDÉG CSAPAT</span>
        <input type="text" id="away-team" list="teams" placeholder="pl. Liverpool" required />
      </label>

      <datalist id="teams"></datalist>

      <button type="submit" class="btn-neon">
        <span>&#9654; RUN PREDICTION</span>
      </button>
    </form>
  </section>

  <section id="result" class="panel result hidden">
    <h2 class="panel-title">&gt;&gt; PREDICTION_OUTPUT</h2>
    <div id="result-body"></div>
  </section>

  <section id="breakdown" class="panel breakdown hidden">
    <div class="breakdown-header">
      <h2 class="panel-title">&gt;&gt; DETAILED_REASONING</h2>
      <button id="toggle-breakdown" class="btn-small">HIDE</button>
    </div>
    <div id="breakdown-body"></div>
  </section>
</main>

<footer>
  <p>// POWERED BY POISSON × ELO × MONTE-CARLO ENSEMBLE //</p>
</footer>

<script src="teams.js"></script>
<script src="fixtures.js"></script>
<script src="predictor.js"></script>
<script src="app.js"></script>
</body>
</html>
